<html lang="en">

<style>
  :root {
    --bg: #0d0d0d;
    --bg-card: #161616;
    --bg-hover: #1f1f1f;
    --bg-active: #2a2a2a;
    --border: #2e2e2e;
    --border-active: #555;
    --text-primary: #f0f0f0;
    --text-secondary: #888;
    --text-muted: #555;
    --accent: #e0e0e0;
    --accent-dim: #3a3a3a;
    --pass: #22c55e;
    --fail: #ef4444;
    --warn: #f59e0b;
    --radius: 8px;
    --radius-sm: 5px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .header-logo {
    width: 28px; height: 28px;
    background: var(--text-primary);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .header-logo svg { display: block; }
  .header-title { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
  .header-sub { font-size: 12px; color: var(--text-secondary); margin-left: auto; }

  /* ── Layout ── */
  .layout {
    display: flex;
    height: calc(100vh - 69px);
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    padding: 20px 0;
    overflow-y: auto;
  }
  .sidebar-section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 0 16px;
    margin-bottom: 8px;
  }
  .level-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 9px 16px;
    background: none;
    border: none;
    color: var(--text-secondary);
    font-size: 13px;
    cursor: pointer;
    text-align: left;
    transition: background 0.1s, color 0.1s;
    border-radius: 0;
  }
  .level-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
  .level-btn.active { background: var(--bg-active); color: var(--text-primary); }
  .level-btn .level-num {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--border);
    font-size: 11px;
    font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.1s;
  }
  .level-btn.active .level-num { background: var(--text-primary); color: var(--bg); }
  .level-count {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-muted);
  }

  /* ── Main ── */
  .main {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Test tabs ── */
  .test-tabs-bar {
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: flex-end;
    gap: 2px;
    overflow-x: auto;
    flex-shrink: 0;
  }
  .test-tab {
    padding: 12px 14px 11px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--text-secondary);
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
    transition: color 0.1s, border-color 0.1s;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .test-tab:hover { color: var(--text-primary); }
  .test-tab.active { color: var(--text-primary); border-bottom-color: var(--text-primary); }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    flex-shrink: 0;
  }
  .status-dot.pass { background: var(--pass); }
  .status-dot.fail { background: var(--fail); }
  .status-dot.warn { background: var(--warn); }

  /* ── Content ── */
  .content-area {
    flex: 1;
    overflow-y: auto;
    padding: 32px;
  }

  /* ── Empty state ── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--text-muted);
    text-align: center;
  }
  .empty-state-icon {
    width: 48px; height: 48px;
    border: 1.5px dashed var(--border);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 4px;
  }
  .empty-state-title { font-size: 14px; color: var(--text-secondary); }
  .empty-state-sub { font-size: 12px; }

  /* ── Test result card ── */
  .test-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 24px;
    gap: 16px;
  }
  .test-label { font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }
  .test-title { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 4px; }
  .test-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
  .badge {
    padding: 4px 10px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    flex-shrink: 0;
  }
  .badge.pass { background: #14532d; color: #4ade80; }
  .badge.fail { background: #450a0a; color: #f87171; }
  .badge.warn { background: #451a03; color: #fbbf24; }
  .badge.pending { background: var(--bg-active); color: var(--text-secondary); }

  .section-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .result-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
  }
  .result-cell {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
  }
  .result-cell-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
  .result-cell-value { font-size: 14px; font-weight: 500; color: var(--text-primary); }

  .notes-box {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    font-size: 13px;
    line-height: 1.7;
    color: var(--text-secondary);
    margin-bottom: 28px;
    white-space: pre-wrap;
  }

  .screenshot-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
  }
  .screenshot-placeholder {
    background: var(--bg-card);
    border: 1.5px dashed var(--border);
    border-radius: var(--radius);
    aspect-ratio: 16/10;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted);
    font-size: 12px;
    gap: 8px;
  }
  .screenshot-placeholder img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: var(--radius);
    display: none;
  }

  /* ── Data tables ── */
  .t-wrap { overflow-x: auto; margin-bottom: 28px; }
  .data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .data-table thead tr { background: #1e1e1e; }
  .data-table th { padding: 8px 12px; text-align: left; font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid var(--border); white-space: nowrap; }
  .data-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); color: var(--text-secondary); vertical-align: top; line-height: 1.6; }
  .data-table td:first-child { color: var(--text-muted); width: 32px; font-size: 11px; }
  .data-table td:nth-child(2) { color: var(--text-primary); font-size: 12px; white-space: nowrap; }
  .data-table tbody tr:hover td { background: var(--bg-hover); }
  .inline-note { font-size: 12px; color: #92400e; background: #1c1107; border: 1px solid #451a03; border-radius: var(--radius-sm); padding: 8px 12px; margin-bottom: 28px; }

  /* ── Add test button ── */
  .add-test-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 9px 14px 11px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--text-muted);
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
    transition: color 0.1s;
  }
  .add-test-btn:hover { color: var(--text-secondary); }

  /* ── Divider ── */
  .divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

  /* hide inactive panels */
  .level-panel { display: none; }
  .level-panel.active { display: flex; flex-direction: column; height: 100%; }
  .test-panel { display: none; }
  .test-panel.active { display: block; }
</style>
</head>

  Tutti i token di colore letti da <code>tokens/03072026_tokens.json</code> via use_figma + Plugin API.<br>
  <strong>474 Primitives</strong> · <strong>500 semantici (1.colors)</strong> · <strong>67 color-map (6.color-map)</strong> = <strong>1041 token</strong> con valori hex risolti.
</div>

<div style="display:flex;gap:8px;margin:16px 0;flex-wrap:wrap" id="tok-tabs">
  <button onclick="showTokTab('primitives')" class="tok-tab-btn active" id="ttb-primitives" style="padding:6px 14px;border-radius:6px;border:1px solid var(--border-active);background:var(--bg-active);color:var(--text-primary);cursor:pointer;font-size:12px;font-weight:600">Primitives (474)</button>
  <button onclick="showTokTab('semantic')"   class="tok-tab-btn"        id="ttb-semantic"   style="padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-secondary);cursor:pointer;font-size:12px">1.colors — semantici (500)</button>
  <button onclick="showTokTab('colormap')"   class="tok-tab-btn"        id="ttb-colormap"   style="padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-secondary);cursor:pointer;font-size:12px">6.color-map (67)</button>
</div>

<div id="tok-pane-primitives"></div>
<div id="tok-pane-semantic"   style="display:none"></div>
<div id="tok-pane-colormap"   style="display:none"></div>

<script>
(function() {
  function swatch(hex) {
    if (!hex) return '<span style="color:#555">—</span>';
    const bg = hex.startsWith('#') ? hex : hex;
    const disp = hex.slice(0,7).toUpperCase();
    return \`<span style="display:inline-flex;align-items:center;gap:5px"><span style="display:inline-block;width:13px;height:13px;background:\${bg};border-radius:3px;border:1px solid rgba(255,255,255,.12);flex-shrink:0"></span><code style="font-size:11px">\${disp}</code></span>\`;
  }

  function mainHex(modes) {
    return modes.value || modes.light || modes.dark || Object.values(modes)[0] || null;
  }

  function contextFromName(name) {
    const ctxMap = {
      background: 'Sfondi componenti e pagine',
      text:       'Colori testo e tipografia',
      icon:       'Colori icone e simboli',
      border:     'Bordi, outline e divider',
      data:       'Visualizzazioni dati e chart',
    };
    const part = name.split('/')[0];
    return ctxMap[part] || part;
  }

  function buildPrimitivesPane(groups) {
    const catDesc = {
      primary:    'Scala navy → dal più chiaro (50) al più scuro (700) · colore brand principale',
      secondary:  'Scala blu scurissimo/nero · sfondo dark e superfici profonde',
      grey:       'Scala grigi neutri · 15→700 da quasi-bianco a nero',
      'accent-lightMode': 'Blu brillante per il tema light · CTA, link, focus',
      'accent-darkMode':  'Blu brillante per il tema dark · CTA, link, focus',
      'success-lightMode':'Verde lime · stati success in light mode',
      'success-darkMode': 'Verde lime · stati success in dark mode',
      'error-lightMode':  'Rosso · stati error in light mode',
      'error-darkMode':   'Rosso · stati error in dark mode',
      'critical-lightMode':'Rosso critico · warning critici in light',
      'critical-darkMode': 'Rosso critico · warning critici in dark',
      white:      'Bianco puro e varianti alpha (a1–a90)',
      black:      'Nero puro e varianti alpha (a5–a80)',
    };
    let html = '<div class="section-title">Primitives — token raw (non usare direttamente nelle schermate)</div>';
    html += '<div class="notes-box" style="margin-bottom:16px">I Primitives sono valori base. In Figma applicare sempre i token semantici <strong>1.colors</strong> o <strong>6.color-map</strong>.</div>';
    for (const [cat, tokens] of Object.entries(groups)) {
      const desc = catDesc[cat] || '';
      html += \`<div class="section-title" style="margin-top:18px">\${cat} (\${tokens.length})\${desc ? ' <span style="font-weight:400;color:var(--text-secondary);font-size:11px">— ' + desc + '</span>' : ''}</div>\`;
      html += '<div class="t-wrap"><table class="data-table"><thead><tr><th>Nome token</th><th>Hex</th></tr></thead><tbody>';
      for (const t of tokens) {
        const hex = mainHex(t.modes);
        html += \`<tr><td style="font-family:monospace;font-size:11px">\${t.name}</td><td>\${swatch(hex)}</td></tr>\`;
      }
      html += '</tbody></table></div>';
    }
    return html;
  }

  function buildSemanticPane(groups) {
    const catDesc = {
      background: 'Sfondi — applicare a fill di frame, card, modal, pannelli',
      text:       'Testo — applicare a fill di nodi TEXT',
      icon:       'Icone — applicare a fill di vettori e icone SVG',
      border:     'Bordi — applicare a stroke di frame e componenti',
      data:       'Visualizzazioni dati — chart, gauge, KPI',
    };
    const stateDesc = {
      default:  'Stato normale',
      hover:    'Stato hover / puntamento',
      selected: 'Stato selezionato / attivo',
      disabled: 'Stato disabilitato',
      ghost:    'Variante trasparente (alpha 0)',
      pressed:  'Stato premuto / click',
    };
    let html = '<div class="section-title">1.colors — token semantici (USARE QUESTI IN FIGMA)</div>';
    html += '<div class="notes-box" style="margin-bottom:16px;color:#86efac;background:#052e16;border-color:#166534">Questi token hanno <strong>light</strong> e <strong>dark</strong> mode. In Figma applicarli come variabili — si adattano automaticamente al tema.</div>';
    for (const [cat, tokens] of Object.entries(groups)) {
      const desc = catDesc[cat] || '';
      html += \`<div class="section-title" style="margin-top:18px">\${cat} (\${tokens.length})\${desc ? ' <span style="font-weight:400;color:var(--text-secondary);font-size:11px">— ' + desc + '</span>' : ''}</div>\`;
      html += '<div class="t-wrap"><table class="data-table"><thead><tr><th>Nome token</th><th>Light</th><th>Dark</th><th>Stato</th></tr></thead><tbody>';
      for (const t of tokens) {
        const name = t.name.replace(/^[^/]+\//, '');
        const parts = name.split('/');
        const stato = parts[parts.length - 1];
        const ctx   = parts.slice(0, -1).join('/');
        const stateLabel = stateDesc[stato] || stato;
        html += \`<tr>
          <td style="font-family:monospace;font-size:11px">\${name}</td>
          <td>\${swatch(t.modes.light)}</td>
          <td>\${swatch(t.modes.dark)}</td>
          <td style="color:var(--text-secondary);font-size:11px">\${stateLabel}</td>
        </tr>\`;
      }
      html += '</tbody></table></div>';
    }
    return html;
  }

  function buildColormapPane(groups) {
    let html = '<div class="section-title">6.color-map — token per contesti specifici</div>';
    html += '<div class="notes-box" style="margin-bottom:16px">Token con tre modalità: <strong>light</strong>, <strong>dark</strong>, <strong>satellite</strong> (mappa geospaziale). Usare per componenti contestuali come tooltip, waypoint, map overlay.</div>';
    for (const [cat, tokens] of Object.entries(groups)) {
      html += \`<div class="section-title" style="margin-top:18px">\${cat} (\${tokens.length})</div>\`;
      html += '<div class="t-wrap"><table class="data-table"><thead><tr><th>Nome token</th><th>Light</th><th>Dark</th><th>Satellite</th></tr></thead><tbody>';
      for (const t of tokens) {
        const name = t.name.replace(/^[^/]+\/[^/]+\//, '');
        html += \`<tr>
          <td style="font-family:monospace;font-size:11px">\${name}</td>
          <td>\${swatch(t.modes.light)}</td>
          <td>\${swatch(t.modes.dark)}</td>
          <td>\${swatch(t.modes.satellite)}</td>
        </tr>\`;
      }
      html += '</tbody></table></div>';
    }
    return html;
  }

  function showTokTab(tab) {
    ['primitives','semantic','colormap'].forEach(t => {
      document.getElementById('tok-pane-' + t).style.display = t === tab ? '' : 'none';
      const btn = document.getElementById('ttb-' + t);
      btn.style.background = t === tab ? 'var(--bg-active)' : 'var(--bg-card)';
      btn.style.borderColor = t === tab ? 'var(--border-active)' : 'var(--border)';
      btn.style.color = t === tab ? 'var(--text-primary)' : 'var(--text-secondary)';
      btn.style.fontWeight = t === tab ? '600' : '400';
    });
  }

  window.showTokTab = showTokTab;

  function init() {
    if (!window.TOKEN_DATA) {
      document.getElementById('tok-pane-primitives').innerHTML = '<div class="notes-box" style="color:#fbbf24">Token data non caricato — assicurati che token-data.js sia incluso.</div>';
      return;
    }
    const d = window.TOKEN_DATA;
    document.getElementById('tok-pane-primitives').innerHTML = buildPrimitivesPane(d.primitives);
    document.getElementById('tok-pane-semantic').innerHTML   = buildSemanticPane(d.semantic);
    document.getElementById('tok-pane-colormap').innerHTML   = buildColormapPane(d.colorMap);
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else setTimeout(init, 100);
})();
<\/script>
</div>`,
          screenshots: []
        }
      ]
    }
  ]
};
// ─────────────────────────────────────────────

let activeLevel = data.levels[0].id;
let activeTabs = {}; // levelId → testId

// Init default active tabs
data.levels.forEach(l => { activeTabs[l.id] = l.tests[0]?.id || null; });

function statusLabel(s) {
  return { pass: "Pass", fail: "Fail", warn: "Warning", pending: "Pending" }[s] || "Pending";
}

function renderSidebar() {
  const nav = document.getElementById("level-nav");
  nav.innerHTML = "";
  data.levels.forEach(level => {
    const total = level.tests.length;
    const btn = document.createElement("button");
    btn.className = "level-btn" + (level.id === activeLevel ? " active" : "");
    btn.innerHTML = `
      <span class="level-num">${level.id.replace("L","")}</span>
      ${level.label}
      <span class="level-count">${total}</span>
    `;
    btn.onclick = () => { activeLevel = level.id; render(); };
    nav.appendChild(btn);
  });
}

function renderMain() {
  const main = document.getElementById("main-area");
  main.innerHTML = "";

  const level = data.levels.find(l => l.id === activeLevel);
  if (!level) return;

  const activeTest = activeTabs[level.id];

  // Tabs bar
  const tabsBar = document.createElement("div");
  tabsBar.className = "test-tabs-bar";

  level.tests.forEach(test => {
    const tab = document.createElement("button");
    tab.className = "test-tab" + (test.id === activeTest ? " active" : "");
    const dot = document.createElement("span");
    dot.className = "status-dot " + (test.status !== "pending" ? test.status : "");
    tab.appendChild(dot);
    tab.appendChild(document.createTextNode(test.label));
    tab.onclick = () => { activeTabs[level.id] = test.id; render(); };
    tabsBar.appendChild(tab);
  });

  main.appendChild(tabsBar);

  // Content
  const contentArea = document.createElement("div");
  contentArea.className = "content-area";

  const test = level.tests.find(t => t.id === activeTest);

  if (!test) {
    contentArea.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M10 6v4M10 14h.01" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="10" cy="10" r="7.5" stroke="#555" stroke-width="1.5"/>
          </svg>
        </div>
        <span class="empty-state-title">No test selected</span>
        <span class="empty-state-sub">Select a test from the tabs above</span>
      </div>`;
    main.appendChild(contentArea);
    return;
  }

  // Test header
  const hasContent = test.notes || Object.keys(test.meta).length > 0 || test.screenshots.length > 0;

  if (!hasContent && test.status === "pending") {
    contentArea.innerHTML = `
      <div class="test-header">
        <div>
          <div class="test-title">${test.title}</div>
          ${test.description ? `<div class="test-desc">${test.description}</div>` : ""}
        </div>
        <span class="badge ${test.status}">${statusLabel(test.status)}</span>
      </div>
      <div class="empty-state" style="height:calc(100% - 80px)">
        <div class="empty-state-icon">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M10 5v5l3 3" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="10" cy="10" r="7.5" stroke="#555" stroke-width="1.5"/>
          </svg>
        </div>
        <span class="empty-state-title">Waiting for results</span>
        <span class="empty-state-sub">This test hasn't been run yet</span>
      </div>`;
    main.appendChild(contentArea);
    return;
  }

  let html = `
    <div class="test-header">
      <div>
        <div class="test-label">${test.label}</div>
        <div class="test-title">${test.title}</div>
        ${test.description ? `<div class="test-desc">${test.description}</div>` : ""}
      </div>
      <span class="badge ${test.status}">${statusLabel(test.status)}</span>
    </div>
  `;

  if (Object.keys(test.meta).length > 0) {
    html += `<div class="section-title">Details</div><div class="result-grid">`;
    for (const [k, v] of Object.entries(test.meta)) {
      html += `<div class="result-cell"><div class="result-cell-label">${k}</div><div class="result-cell-value">${v}</div></div>`;
    }
    html += `</div>`;
  }

  if (test.content) {
    html += test.content;
  } else if (test.notes) {
    html += `<div class="section-title">Notes</div><div class="notes-box">${test.notes}</div>`;
  }

  if (test.screenshots.length > 0) {
    html += `<div class="section-title">Screenshots</div><div class="screenshot-grid">`;
    test.screenshots.forEach(src => {
      html += `<div class="screenshot-placeholder"><img src="${src}" alt="screenshot" onload="this.style.display='block';this.parentElement.querySelector('span') && (this.parentElement.querySelector('span').style.display='none')"/><span>Screenshot</span></div>`;
    });
    html += `</div>`;
  }

  contentArea.innerHTML = html;
  main.appendChild(contentArea);
}

function render() {
  renderSidebar();
  renderMain();
}

render();
</script>
</body>
</html>
